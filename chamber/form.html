    <link rel="stylesheet" href="./styles/larger.css">
    <title>[Jeune Winsley] Dessaline Chamber Register Form</title>
</head>
<body>
  <header>
    <nav class="container">
        <img class="logo" src="./images/dcc-logo.png" alt="Dessalines chamber of commerce" width="120" height="50">
        <ul class="ul-container">
            <li class="li-container"><a href="#" class="nav-link">About DCC</a></li>
            <li class="li-container"><a href="#" class="nav-link">Economic Developement</a></li>
            <li class="li-container"><a href="#" class="nav-link">Market</a></li>
            <li class="li-container"><a href="#" class="nav-link">Events</a></li>
            <li class="li-container"><a href="#" class="nav-link">Education</a></li>
            <li class="li-container"><a href="#" class="nav-link">Contact us</a></li>
            <li class="li-container"><a href="#" class="nav-link">Patners</a></li>
        </ul>
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        </nav>        
</header>
    <main class="main-form">
       
        <form class="conatainer-form" action="post" method="GET">
            <h1>Resgiter</h1>
            <div class="username-container">
              <label for="username">Username:</label>
              <input type="text" id="username" name="username" required>
            </div>
          
            <div class="username-password">
              <label for="password">Password:</label>
              <input type="password" id="password" name="password" required pattern="^[A-Za-z0-9]{3,16}$">
            </div>
          
            <div class="username-confirm-password">
              <label for="confirm-password">Confirm Password:</label>
              <input type="password" id="confirm-password" name="confirm-password" pattern="^[A-Za-z0-9]{3,16}$" required oninput="checkPasswordMatch()">
              <p id="password-match-message"></p>
            </div>
          
            <div class="email">
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required pattern=".+@byui\.edu$"  title="Please enter a valid email address">
            </div>
          
            <div class="page-rating">
              <label for="page-rating">Page Rating:</label>
              <input type="range" id="page-rating" name="page-rating" min="1" max="10"  oninput="updateRangeValue()">
              <span id="range-value">1</span>
            </div>
          
            <button type="submit" class="page-rating">Submit</button>
          </form>
          
          
    </main>
    <div class="space-form"></div>
    <footer class="footer-container">
        <div class="footer-section-container">
            <div class="section-div-container item1">
                <form class="form-footer" >
                    <label for="email">Suscribe to our news letter</label>
                    <input type="email" name="email" id="email" class="form-footer-input">
                    <button type="submit">Suscribe</button>
                </form>
            </div>
            <div class="section-div-container">
                <h5>About Us</h5>
                <ul class="section-div-ul-container">
                    <li>Mission</li>
                    <li>Vision</li>
                    <li>Values</li>
                    <li>Boards</li>
                    <li>Council</li>
                </ul>                
            </div>
            <div class="section-div-container">
                  <h5>Areas</h5>
                <ul class="section-div-ul-container">
                  
                    <li>Domestic Trade</li>
                    <li>Labor Affairs</li>
                    <li>Economy</li>
                    <li>Foreign Trade</li>
                    <li>International </li>
                </ul>                
            </div>
        </div>
        
    </footer>
    <script src="./scripts/data.js"></script>
</body>
</html>
