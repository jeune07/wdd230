        <main class="main-form">       
            <form class="conatainer-form" action="thankyou.html" method="get">
                <div><h1>Join Us</h1></div>
                <div class="username-container">
                  <label for="first_name">Applicant's First Name:</label>
                  <input type="text" id="first_name" name="first_name" required>
                </div>

                <div class="username-container">
                    <label for="last_name">Applicant's Last Name:</label>
                    <input type="text" id="last_name" name="last_name" required>
                  </div>
                  <div class="username-container">
                    <label for="position">Applicant's Title/Position:</label>
                    <input type="text" id="position" name="position" pattern="[A-Za-z\s\-]{7,}">
                  </div>

                  <div class="form-element username-container">
                    <label for="e-mail">Email Address:</label>
                    <input type="email" id="e-mail" name="e-mail" required placeholder="example@example.com">
                </div>
                
                <div class="form-element">
                    <label for="phone">Mobile Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
        
                <div class="form-element">
                    <label for="organization">Business/Organization Name:</label>
                    <input type="text" id="organization" name="organization" required>
                </div>
        
                <div class="form-element">
                    <label for="membership_level">Membership Level:</label>
                    <select id="membership_level" name="membership_level" class="username-container">
                        <option value="NP">NP Membership (Free)</option>
                        <option value="Bronze">Bronze Membership ($100)</option>
                        <option value="Silver">Silver Membership ($200)</option>
                        <option value="Gold">Gold Membership ($300)</option>
                    </select>
                </div>
        
                <div class="form-element username-container">
                    <label for="description">Business/Organization Description:</label>
                    <textarea id="description" name="description"></textarea>
                </div>
                <div style="display: none;"><input type="hidden" id="timestamp" name="timestamp" value=""></div>
